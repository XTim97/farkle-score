<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Combo Buttons - Farkle Score</title>
<link rel="stylesheet" href="../styles.css">
<style>body{padding:1rem}.ds-note{color:var(--muted);font-size:.75rem;margin:1rem 0 0}</style>
</head>
<body>

  <div class="combo-grid">
    <button class="combo dice-1"><span class="combo-label">Single 1</span><span class="combo-points">100</span></button>
    <button class="combo dice-1"><span class="combo-label">Single 5</span><span class="combo-points">50</span></button>
    <button class="combo dice-3"><span class="combo-label">Three 4s</span><span class="combo-points">400</span></button>
    <button class="combo dice-4"><span class="combo-label">Four of a Kind</span><span class="combo-points">1,000</span></button>
    <button class="combo dice-5"><span class="combo-label">Small Straight</span><span class="combo-points">850</span></button>
    <button class="combo dice-6" disabled><span class="combo-label">Large Straight</span><span class="combo-points">1,500</span></button>
  </div>
<p class="ds-note">Farkle Score v3 · Combo Buttons</p>
</body>
</html>
