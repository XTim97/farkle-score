<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lists - Farkle Score</title>
<link rel="stylesheet" href="../styles.css">
<style>body{padding:1rem}.ds-note{color:var(--muted);font-size:.75rem;margin:1rem 0 0}</style>
</head>
<body>

  <ul class="player-list">
    <li><label><input type="checkbox" checked><span>Matt</span></label><button class="icon">×</button></li>
    <li><label><input type="checkbox"><span>Tim</span></label><button class="icon">×</button></li>
  </ul>
  <ol class="order-list" style="margin-top:.8rem">
    <li><button class="order-slot"><span class="seat">1</span>Matt</button></li>
    <li><button class="order-slot picked"><span class="seat">2</span>Tim</button></li>
  </ol>
  <ul class="ruleset-list" style="margin-top:.8rem">
    <li><div class="rs-info"><strong>Penalty Rules</strong><span class="rs-summary">to 10,000 · entry 500 · 3-farkle -1,000</span></div>
      <div class="rs-actions"><button class="secondary">Edit</button><button class="icon">×</button></div></li>
  </ul>
  <ul class="game-list" style="margin-top:.8rem">
    <li><button class="game-row"><span class="game-date">Jul 21, 2026</span><span class="game-players">🏆 Matt 10,150 · Tim 8,900 · Nick 7,400</span></button></li>
  </ul>
<p class="ds-note">Farkle Score v3 · Lists</p>
</body>
</html>
