<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Buttons - Farkle Score</title>
<link rel="stylesheet" href="../styles.css">
<style>body{padding:1rem}.ds-note{color:var(--muted);font-size:.75rem;margin:1rem 0 0}</style>
</head>
<body>

  <div class="stack" style="margin-top:0">
    <button class="primary big">New Game</button>
    <button class="primary">🏦 Bank 1,250</button>
    <button class="secondary">↻ Roll 3</button>
    <button class="danger">💥 Farkle</button>
    <button class="secondary" disabled>↩️ Undo</button>
  </div>
  <div class="first-picker" style="margin-top:1rem">
    <button class="pill selected">🎲 Random</button>
    <button class="pill">Matt</button>
    <button class="pill">Tim</button>
  </div>
  <div style="display:flex;gap:.6rem;align-items:center;margin-top:1rem">
    <button class="help-btn">?</button>
    <button class="icon">×</button>
    <button class="share-badge">📺 Live · K7MPQ2</button>
  </div>
<p class="ds-note">Farkle Score v3 · Buttons</p>
</body>
</html>
