<html lang="en">
<head>

    <code style="font-size:.8rem">--bg</code><span style="color:var(--muted);font-size:.8rem">page background</span>

  <div style="display:flex;align-items:center;gap:.6rem;margin-top:.4rem">
    <span style="width:2.2rem;height:2.2rem;border-radius:8px;border:1px solid var(--border);background:var(--panel)"></span>
    <code style="font-size:.8rem">--panel</code><span style="color:var(--muted);font-size:.8rem">panel</span>
  </div>
  <div style="display:flex;align-items:center;gap:.6rem;margin-top:.4rem">
    <span style="width:2.2rem;height:2.2rem;border-radius:8px;border:1px solid var(--border);background:var(--text)"></span>
    <code style="font-size:.8rem">--text</code><span style="color:var(--muted);font-size:.8rem">text</span>

    <code style="font-size:.8rem">--border</code><span style="color:var(--muted);font-size:.8rem">border</span>
  </div>
  <h2 style="font-size:1rem;margin-top:1rem">Semantic</h2>
  <div style="display:flex;align-items:center;gap:.6rem;margin-top:.4rem">

    <span style="width:2.2rem;height:2.2rem;border-radius:8px;border:1px solid var(--border);background:var(--accent)"></span>
    <code style="font-size:.8rem">--accent</code><span style="color:var(--muted);font-size:.8rem">accent (final round, hot dice, roll chip)</span>

<p class="ds-note">Farkle Score v3 · Color Tokens</p>
